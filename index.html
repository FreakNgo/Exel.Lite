<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antify Deployment Hub</title>
    <style>
        /* Base Environment Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Sequential Overlay Framework */
        .stage-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
            z-index: 10;
        }

        .stage-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* SCREEN 1: Authentic Activision Style Logo Engine */
        .activision-font {
            font-family: "Impact", "Arial Black", sans-serif;
            font-size: clamp(3.5rem, 10vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: #ffffff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
            transform: scaleX(0.85); /* Emulates the ultra-compressed look of the Activision logo */
            opacity: 0;
        }

        /* CODM Cinematic Startup Glitch/Flicker Animation */
        .active .activision-glitch {
            animation: codmBoot 0.6s steps(1) forwards;
        }

        @keyframes codmBoot {
            0% { opacity: 0; transform: scaleX(0.8) scaleY(1); filter: blur(5px); }
            5% { opacity: 1; filter: blur(0px); }
            10% { opacity: 0; }
            15% { opacity: 1; }
            20% { opacity: 0; }
            30% { opacity: 1; transform: scaleX(0.85) scale(1.02); }
            35% { opacity: 0.9; transform: scaleX(0.85) scale(1); }
            100% { opacity: 1; }
        }

        /* SCREEN 2: The Rajveer Initiative Layout */
        .credit-text {
            color: #ffffff;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(10px);
            transition: transform 1.2s ease, opacity 1.2s ease;
        }

        .active .credit-text {
            opacity: 1;
            transform: translateY(0);
        }

        /* SCREEN 3: Tactical Progress Loading Pipeline */
        .loading-title {
            color: #8a8a8f;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        /* Core Progress Vector Track */
        .progress-track {
            width: 260px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffffff, #a3a3a3);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            transition: width 5s linear; /* Perfectly mapped 5-second slide */
        }

        /* SCREEN 4: High-End Minimalist Download Destination */
        .white-screen {
            background-color: #ffffff;
        }

        /* Animated RGB Title Styling */
        .rgb-title {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-align: center;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease 0.2s, transform 0.8s ease 0.2s; /* Delays slightly for a layered entrance */
            
            /* Gradient Background Logic for RGB effect */
            background: linear-gradient(to right, #ff007f, #7f00ff, #00f0ff, #ff007f);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rgbShift 3s linear infinite;
        }

        @keyframes rgbShift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .white-screen.active .rgb-title {
            opacity: 1;
            transform: translateY(0);
        }

        /* Premium Minimalist Button Design */
        .minimal-action-btn {
            padding: 15px 44px;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            background-color: #000000;
            border: 1px solid #000000;
            border-radius: 0; /* Box cut minimalist architecture */
            cursor: pointer;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s, background-color 0.3s ease, color 0.3s ease;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        }

        .white-screen.active .minimal-action-btn {
            opacity: 1;
            transform: translateY(0);
        }

        /* Subtle interactive micro-animations to compel user interaction */
        .minimal-action-btn:hover {
            background-color: transparent;
            color: #000000;
        }

        .minimal-action-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: Activision-Style Boot Sequence -->
    <div id="screen-antify" class="stage-overlay active">
        <div class="activision-font activision-glitch">Antify</div>
    </div>

    <!-- SCREEN 2: Author Credit Roll -->
    <div id="screen-credit" class="stage-overlay">
        <div class="credit-text">An initiative by Rajveer</div>
    </div>

    <!-- SCREEN 3: Operational Pipeline Progress Tracker -->
    <div id="screen-loader" class="stage-overlay">
        <div class="loading-title">Getting your files ready...</div>
        <div class="progress-track">
            <div id="bar-fill" class="progress-fill"></div>
        </div>
    </div>

    <!-- SCREEN 4: Final High-End Target Portal -->
    <div id="screen-download" class="stage-overlay white-screen">
        <h1 class="rgb-title">upgrade to AI finance!</h1>
        <button class="minimal-action-btn" onclick="triggerDeployment()">Download APK</button>
    </div>

    <script>
        // Target APK Remote Drive Link Destination
        const apkSecureEndpoint = "https://drive.google.com/file/d/1G0RB0Rss2y6DNhPYcezW5wlMTKOqOcxt/view?usp=sharing";

        // Global Automation Control Matrix
        window.addEventListener('DOMContentLoaded', () => {
            const antifyScreen = document.getElementById('screen-antify');
            const creditScreen = document.getElementById('screen-credit');
            const loaderScreen = document.getElementById('screen-loader');
            const downloadScreen = document.getElementById('screen-download');
            const barFill = document.getElementById('bar-fill');

            // 1. Move from Antify Logo to Credit Layer (Holds screen for 2.2 seconds)
            setTimeout(() => {
                antifyScreen.classList.remove('active');
                creditScreen.classList.add('active');
            }, 2200);

            // 2. Move from Credits to the Tactical Processing Loader 
            setTimeout(() => {
                creditScreen.classList.remove('active');
                loaderScreen.classList.add('active');
                
                // Triggers the 5-second layout fill calculation sequence instantly
                setTimeout(() => {
                    barFill.style.width = "100%";
                }, 100);
            }, 4500);

            // 3. Move from Active Loader to the Premium Minimalist White Portal 
            setTimeout(() => {
                loaderScreen.classList.remove('active');
                downloadScreen.classList.add('active');
            }, 9800); // 4.5s initial setups + 5.3s load processing time buffers
        });

        function triggerDeployment() {
            // Fires deployment target interface routing natively
            window.open(apkSecureEndpoint, '_blank');
        }
    </script>
</body>
</html>
